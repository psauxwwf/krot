version: "3"

dotenv: ["build.env"]

vars:
  gobin: go
  ldflags: "-extldflags '-static' -w -s -buildid="
  gcflags: "all=-trimpath={{.PWD}} -dwarf=false -l"
  asmflags: "all=-trimpath={{.PWD}}"
  tmp_dir: "/tmp/krot"
  android_ndk: "{{.PWD}}/android-ndk-r27"
  android_api: "24"
  android_clang: "{{.android_ndk}}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android{{.android_api}}-clang"
  bin: "{{.PWD}}/bin"
  app: "krot"
  app_bin: "{{.bin}}/{{.app}}"
  app_termux_bin: "{{.bin}}/{{.app}}_termux"
  release_linux_archive: "{{.bin}}/{{.app}}_linux_amd64.tar.gz"
  release_termux_archive: "{{.bin}}/{{.app}}_android_arm64_termux.tar.gz"

env:
  COMPOSE_BAKE: true
  CGO_ENABLED: 0
  GOARCH: amd64
  GOOS: linux

tasks:
  setup:
    desc: set up the environment
    internal: true
    silent: true
    cmds:
      - mkdir -p {{.bin}}
      - mkdir -p {{.tmp_dir}}
      - task: setup:xray-checker

  vless:
    desc: download and merge vless githubmirror files
    deps:
      - build:linux
    cmds:
      - mkdir -p {{.tmp_dir}}
      - |
        for i in $(seq 1 26); do
          curl -fsSL -o "{{.tmp_dir}}/vless-${i}.txt" "https://github.com/AvenCores/goida-vpn-configs/raw/refs/heads/main/githubmirror/${i}.txt" &
        done
        wait
      - task: vless:merge
        vars:
          input_glob: "{{.tmp_dir}}/vless-*.txt"

  vless:small:
    desc: download small vless file
    deps:
      - build:linux
    cmds:
      - mkdir -p {{.tmp_dir}}
      - |
        curl -fsSL -o "{{.tmp_dir}}/vless-1.txt" "https://raw.githubusercontent.com/zieng2/wl/main/vless_universal.txt" &
        curl -fsSL -o "{{.tmp_dir}}/vless-2.txt" "https://github.com/AvenCores/goida-vpn-configs/raw/refs/heads/main/githubmirror/26.txt" &
        wait
      - task: vless:merge
        vars:
          input_glob: "{{.tmp_dir}}/vless-*.txt"

  vless:merge:
    desc: merge and parse vless source files
    internal: true
    requires:
      vars:
        - input_glob
    cmds:
      - cat {{.input_glob}} > {{.tmp_dir}}/vless.txt
      - |
        {{.app_bin}} -in={{.tmp_dir}}/vless.txt -out={{.bin}}/vless-union.txt -parse -level=error -workers=80
      - rm -f {{.input_glob}} {{.tmp_dir}}/vless.txt

  mtproto:
    desc: download mtproto source files
    deps:
      - setup
    cmds:
      - curl -fsSL -o {{.bin}}/mtproto-union.txt "https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt"

  setup:xray-checker:
    desc: clone xray-checker if missing
    internal: true
    status:
      - test -d xray-checker
      - grep -q '^module github.com/kutovoys/xray-checker$' xray-checker/go.mod
      - '! grep -R --include=''*.go'' -q ''"xray-checker/'' xray-checker'
    cmds:
      - test -d xray-checker || git clone https://github.com/kutovoys/xray-checker
      - sed -i 's|^module xray-checker$|module github.com/kutovoys/xray-checker|' xray-checker/go.mod
      - grep -R -l --include='*.go' '"xray-checker/' xray-checker | xargs -r sed -i 's|"xray-checker/|"github.com/kutovoys/xray-checker/|g'

  setup:android-ndk:
    desc: install android ndk r27 if missing
    internal: true
    status:
      - test -x {{.android_clang}}
    cmds:
      - curl -fsSL -o /tmp/android-ndk-r27-linux.zip "https://dl.google.com/android/repository/android-ndk-r27-linux.zip"
      - unzip -q /tmp/android-ndk-r27-linux.zip -d {{.PWD}}

  build:
    desc: build all targets
    deps:
      - build:linux
      - build:termux

  build:linux:
    desc: build for linux amd64
    deps:
      - setup
    cmds:
      - >
        {{.gobin}} build
        -tags netgo
        -ldflags="{{.ldflags}}"
        -trimpath
        -gcflags="{{.gcflags}}"
        -asmflags="{{.asmflags}}"
        -o {{.app_bin}} cmd/{{.app}}/main.go
      - strip {{.app_bin}}
      - objcopy --strip-unneeded {{.app_bin}}

  build:termux:
    desc: build for termux (android arm64)
    deps:
      - setup
      - setup:android-ndk
    cmds:
      - >
        CGO_ENABLED=1 GOOS=android GOARCH=arm64
        CC={{.android_clang}} CXX={{.android_clang}}
        {{.gobin}} build
        -ldflags="-w -s"
        -trimpath
        -gcflags="{{.gcflags}}"
        -asmflags="{{.asmflags}}"
        -o {{.app_termux_bin}} cmd/{{.app}}/main.go

  release:pack:
    desc: create release archives
    internal: true
    cmds:
      - tar -czf {{.release_linux_archive}} -C {{.bin}} {{.app}} mtproto.txt vless.txt
      - tar -czf {{.release_termux_archive}} -C {{.bin}} {{.app}}_termux mtproto.txt vless.txt

  release:
    desc: build and prepare release
    deps:
      - build
    cmds:
      - task: vless
      - task: mtproto
      - sort -u {{.bin}}/vless-union.txt > {{.bin}}/vless.txt
      - sort -u {{.bin}}/mtproto-union.txt > {{.bin}}/mtproto.txt
      - task: release:pack

  release:create:
    desc: build and publish github release
    deps:
      - release
    cmds:
      - |
        TAG=$(date +v%m.%d.%H)
        gh release create "$TAG" {{.release_linux_archive}} {{.release_termux_archive}}

  release:small:
    desc: build private release
    deps:
      - build
    cmds:
      - task: vless:small
      - task: mtproto
      - sort -u vless.txt {{.bin}}/vless-union.txt > {{.bin}}/vless.txt
      - sort -u mtproto.txt {{.bin}}/mtproto-union.txt > {{.bin}}/mtproto.txt
      - task: release:pack
