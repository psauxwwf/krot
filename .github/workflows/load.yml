name: Load pipeline

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release from
        required: true
        default: master

permissions:
  contents: write

jobs:
  load:
    name: Load and publish creds files
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y binutils tar gzip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Load cred files
        run: task pipeline

      - name: Set tag name
        run: echo "GITHUB_RELEASE_TAG=$(date +load_%m.%d.%H)" >> "$GITHUB_ENV"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GITHUB_RELEASE_TAG }}
          draft: false
          prerelease: false
          files: |
            ./bin/mtproto.txt
            ./bin/vless.txt
            ./bin/vless_small.txt
