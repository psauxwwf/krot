name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to release from
        required: true
        default: master

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y binutils tar gzip curl unzip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Cache Android NDK r27
        id: cache-android-ndk
        uses: actions/cache@v4
        with:
          path: ./android-ndk-r27
          key: ${{ runner.os }}-android-ndk-r27

      - name: Install Android NDK r27
        if: steps.cache-android-ndk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/android-ndk-r27-linux.zip "https://dl.google.com/android/repository/android-ndk-r27-linux.zip"
          unzip -q /tmp/android-ndk-r27-linux.zip -d .

      - name: Build project
        run: task release

      - name: Set tag name
        run: echo "GITHUB_RELEASE_TAG=$(date +v%m.%d.%H)" >> "$GITHUB_ENV"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GITHUB_RELEASE_TAG }}
          draft: false
          prerelease: false
          files: |
            ./bin/${{ github.event.repository.name }}_linux_amd64.tar.gz
            ./bin/${{ github.event.repository.name }}_android_arm64_termux.tar.gz
            ./bin/mtproto.txt
            ./bin/vless.txt
            ./bin/vless_small.txt
